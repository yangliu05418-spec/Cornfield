global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - /etc/prometheus/prometheus-rules.yml
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
scrape_configs:
  - job_name: image-studio-api
    static_configs:
      - targets: ["api:8081"]
    metrics_path: /metrics
  - job_name: host
    static_configs:
      - targets: ["node-exporter:9100"]
