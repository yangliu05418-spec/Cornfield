version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Hong_Kong
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Hong_Kong
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Hong_Kong
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: "03:15"
      timezone: Asia/Hong_Kong
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Hong_Kong
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Hong_Kong
    open-pull-requests-limit: 5
