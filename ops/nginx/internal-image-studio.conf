limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=callback:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=provider_asset:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=client_connections:10m;

upstream image_studio_web { server 127.0.0.1:8080; keepalive 16; }
upstream image_studio_api { server 127.0.0.1:8081; keepalive 32; }

server {
    listen 443 ssl http2;
    server_name studio.internal.example;

    # CF-Connecting-IP is authoritative only when the TCP peer belongs to an
    # official Cloudflare network. Direct clients cannot spoof this header.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    ssl_certificate /etc/letsencrypt/live/studio.internal.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.internal.example/privkey.pem;
    client_max_body_size 25m;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types application/javascript application/json application/manifest+json image/svg+xml text/css text/plain;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # The web build externalizes TanStack's bootstrap scripts. Inline styles are
    # still required for virtual-wall geometry, but inline script is forbidden.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' blob: data:; style-src 'self'; style-src-attr 'unsafe-inline'; script-src 'self'; script-src-attr 'none'; connect-src 'self'; object-src 'none'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    location = /api/v1/auth/login {
        limit_req zone=login burst=4 nodelay;
        proxy_pass http://image_studio_api;
        include /etc/nginx/proxy_params;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location ^~ /api/v1/provider-callbacks/ {
        limit_req zone=callback burst=20 nodelay;
        client_max_body_size 64k;
        access_log off;
        proxy_pass http://image_studio_api;
        include /etc/nginx/proxy_params;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Request-ID $request_id;
    }

    location ^~ /api/v1/provider-assets/ {
        limit_req zone=provider_asset burst=120 nodelay;
        access_log off;
        proxy_pass http://image_studio_api;
        include /etc/nginx/proxy_params;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 2m;
    }

    location = /api/v1/events {
        limit_conn client_connections 250;
        proxy_pass http://image_studio_api;
        include /etc/nginx/proxy_params;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location = /api/v1/uploads {
        limit_req zone=upload burst=8 nodelay;
        proxy_pass http://image_studio_api;
        include /etc/nginx/proxy_params;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location ~ ^/api/v1/uploads/[^/]+/content$ {
        limit_req zone=upload burst=8 nodelay;
        limit_conn client_connections 16;
        client_body_timeout 5m;
        proxy_pass http://image_studio_api;
        include /etc/nginx/proxy_params;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering off;
    }

    location /api/ {
        proxy_pass http://image_studio_api;
        include /etc/nginx/proxy_params;
		proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /_protected_assets/ {
        internal;
        alias /srv/internal-image-studio/data/assets/;
        sendfile on;
        aio threads;
        open_file_cache max=10000 inactive=30s;
        open_file_cache_valid 60s;
    }

    location / {
        proxy_pass http://image_studio_web;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
